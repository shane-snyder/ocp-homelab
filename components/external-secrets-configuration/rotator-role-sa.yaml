apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-token-updater
  namespace: external-secrets
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["vault-token"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-token-updater-binding
  namespace: external-secrets
subjects:
- kind: ServiceAccount
  name: vault-token-rotator
  namespace: external-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-token-updater
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-token-rotator
  namespace: external-secrets