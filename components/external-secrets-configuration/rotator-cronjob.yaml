apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-token-rotator
  namespace: external-secrets
spec:
  schedule: "0 9 * * 1" 
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: vault-token-rotator
          containers:
          - name: rotator
            image: registry.redhat.io/openshift4/ose-cli:latest
            command:
            - /bin/sh
            - -c
            - |
              set -e
              OLD_TOKEN=$(oc get secret vault-token -n external-secrets -o jsonpath='{.data.token}' | base64 -d)
              
              RESPONSE=$(curl -k -s \
                --header "X-Vault-Token: $OLD_TOKEN" \
                --request POST \
                --data '{"ttl": "720h"}' \
                https://vault.apps.sno-mini.shanehomelab.com/v1/auth/token/create)

              # 3. Parse and Patch
              NEW_TOKEN=$(echo "$RESPONSE" | sed -E 's/.*"client_token":"([^"]+)".*/\1/')

              if echo "$NEW_TOKEN" | grep -q "hvs\."; then
                ENCODED_TOKEN=$(echo -n "$NEW_TOKEN" | base64 | tr -d '\n')
                oc patch secret vault-token -n external-secrets -p "{\"data\":{\"token\":\"$ENCODED_TOKEN\"}}"
                echo "Successfully rotated token using ose-cli image at $(date)"
              else
                echo "Rotation failed. Response: $RESPONSE"
                exit 1
              fi
          restartPolicy: OnFailure