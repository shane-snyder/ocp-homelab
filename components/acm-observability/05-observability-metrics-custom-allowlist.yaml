apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-metrics-custom-allowlist
  namespace: open-cluster-management-observability
  annotations:
    argocd.argoproj.io/sync-wave: "5"
data:
  metrics_list.yaml: |
    names:
      - bearer_token_decoded_created
      - bearer_token_decoded_total
      - go_gc_duration_seconds
      - go_goroutines
      - go_info
      - go_memstats_alloc_bytes
      - go_memstats_alloc_bytes_total
      - go_memstats_buck_hash_sys_bytes
      - go_memstats_frees_total
      - go_memstats_gc_sys_bytes
      - go_memstats_heap_alloc_bytes
      - go_memstats_heap_idle_bytes
      - go_memstats_heap_inuse_bytes
      - go_memstats_heap_objects
      - go_memstats_heap_released_bytes
      - go_memstats_heap_sys_bytes
      - go_memstats_last_gc_time_seconds
      - go_memstats_lookups_total
      - go_memstats_mallocs_total
      - go_memstats_mcache_inuse_bytes
      - go_memstats_mcache_sys_bytes
      - go_memstats_mspan_inuse_bytes
      - go_memstats_mspan_sys_bytes
      - go_memstats_next_gc_bytes
      - go_memstats_other_sys_bytes
      - go_memstats_stack_inuse_bytes
      - go_memstats_stack_sys_bytes
      - go_memstats_sys_bytes
      - go_threads
      - greenlet_duration_seconds
      - greenlet_duration_seconds_created
      - greenlet_switch_created
      - greenlet_switch_total
      - greenlet_throw_created
      - greenlet_throw_total
      - kepler_build_info
      - kepler_node_cpu_active_joules_total
      - kepler_node_cpu_active_watts
      - kepler_node_cpu_idle_joules_total
      - kepler_node_cpu_idle_watts
      - kepler_node_cpu_info
      - kepler_node_cpu_joules_total
      - kepler_node_cpu_usage_ratio
      - kepler_node_cpu_watts
      - kepler_pod_cpu_joules_total
      - kepler_pod_cpu_watts
      - process_cpu_seconds_total
      - process_max_fds
      - process_open_fds
      - process_resident_memory_bytes
      - process_start_time_seconds
      - process_virtual_memory_bytes
      - process_virtual_memory_max_bytes
      - push_failure_time_seconds
      - push_time_seconds
      - pushgateway_build_info
      - pushgateway_http_push_duration_seconds
      - pushgateway_http_push_size_bytes
      - pushgateway_http_requests_total
      - python_gc_collections_total
      - python_gc_objects_collected_total
      - python_gc_objects_uncollectable_total
      - python_info
      - quay_authentication_attempts_created
      - quay_authentication_attempts_total
      - quay_db_close_calls_created
      - quay_db_close_calls_total
      - quay_db_connect_calls_created
      - quay_db_connect_calls_total
      - quay_db_pooled_connections_available
      - quay_db_pooled_connections_in_use
      - quay_gc_iterations_created
      - quay_gc_iterations_total
      - quay_gc_namespaces_purged_created
      - quay_gc_namespaces_purged_total
      - quay_gc_repos_purged_created
      - quay_gc_repos_purged_total
      - quay_gc_storage_blobs_deleted_created
      - quay_gc_storage_blobs_deleted_total
      - quay_instance_key_renewal_self_created
      - quay_instance_key_renewal_self_total
      - quay_model_cache_created
      - quay_model_cache_total
      - quay_multipart_uploads_completed_created
      - quay_multipart_uploads_completed_total
      - quay_multipart_uploads_started_created
      - quay_multipart_uploads_started_total
      - quay_org_rows
      - quay_queue_item_deletes_created
      - quay_queue_item_deletes_total
      - quay_queue_item_gets_created
      - quay_queue_item_gets_total
      - quay_queue_item_puts_created
      - quay_queue_item_puts_total
      - quay_queue_items_available
      - quay_queue_items_available_unlocked
      - quay_queue_items_locked
      - quay_registry_image_pulled_estimated_bytes_created
      - quay_registry_image_pulled_estimated_bytes_total
      - quay_registry_image_pulls_created
      - quay_registry_image_pulls_total
      - quay_registry_image_pulled_estimated_bytes_created
      - quay_registry_image_pulled_estimated_bytes_total
      - quay_registry_image_pushed_bytes_created
      - quay_registry_image_pushed_bytes_total
      - quay_registry_image_pushes_created
      - quay_registry_image_pushes_total
      - quay_repository_rows
      - quay_request_duration_seconds
      - quay_request_duration_seconds_created
      - quay_robot_rows
      - quay_secscan_index_layer_size_bytes
      - quay_secscan_index_layer_size_bytes_created
      - quay_secscan_result_duration_seconds
      - quay_secscan_result_duration_seconds_created
      - quay_user_rows
      - kubevirt_vmi_phase_count
      - kubevirt_vmi_storage_read_traffic_bytes_total
      - kubevirt_allocatable_nodes_count
      - kubevirt_vmi_memory_available_bytes
      - kubevirt_vmi_memory_usable_bytes
      - kubevirt_vmi_storage_iops_read_total
      - kubevirt_vmi_storage_iops_write_total
      - kubevirt_vmi_storage_read_traffic_bytes_total
      - kubevirt_vmi_network_receive_bytes_total
      - kubevirt_vmi_network_transmit_bytes_total
      - kubevirt_vmi_phase_transition_time_from_creation_seconds_bucket
      - container_cpu_usage_seconds_total
      - subscription_sync_total
      - kube_node_labels
    collect_rules:
      - group: -SNOResourceUsage
  # Remove every name/match from the default uwl_metrics_list (HyperShift HCP
  # metrics we don't use). With the merged uwl names+matches list empty, the
  # endpoint operator deletes the uwl-metrics-collector deployment, whose
  # duplicate recording-rule pushes cause HTTP 409 out-of-order errors and the
  # ACMUWLMetricsCollectorForwardRemoteWriteError alert.
  uwl_metrics_list.yaml: |
    names:
      - "-ALERTS"
      - "-apiserver_current_inflight_requests"
      - "-apiserver_request_count"
      - "-apiserver_request_duration_seconds_bucket"
      - "-apiserver_request_total"
      - "-apiserver_storage_objects"
      - "-etcd_debugging_mvcc_db_total_size_in_bytes"
      - "-etcd_mvcc_db_total_size_in_bytes"
      - "-etcd_debugging_snap_save_total_duration_seconds_sum"
      - "-etcd_disk_backend_commit_duration_seconds_bucket"
      - "-etcd_disk_backend_commit_duration_seconds_sum"
      - "-etcd_disk_wal_fsync_duration_seconds_bucket"
      - "-etcd_disk_wal_fsync_duration_seconds_sum"
      - "-etcd_object_counts"
      - "-etcd_network_client_grpc_received_bytes_total"
      - "-etcd_network_client_grpc_sent_bytes_total"
      - "-etcd_network_peer_received_bytes_total"
      - "-etcd_network_peer_sent_bytes_total"
      - "-etcd_server_client_requests_total"
      - "-etcd_server_has_leader"
      - "-etcd_server_health_failures"
      - "-etcd_server_leader_changes_seen_total"
      - "-etcd_server_proposals_failed_total"
      - "-etcd_server_proposals_pending"
      - "-etcd_server_proposals_committed_total"
      - "-etcd_server_proposals_applied_total"
      - "-etcd_server_quota_backend_bytes"
      - "-up"
    matches:
      - '-__name__="process_resident_memory_bytes",job=~"apiserver|etcd"'
      - '-__name__="grpc_server_started_total",job="etcd"'
      - '-__name__="grpc_server_handled_total",job="etcd"'
      - '-__name__="go_goroutines",service="kubernetes"'
      - '-__name__="process_cpu_seconds_total",service="kubernetes"'
      - '-__name__="workqueue_adds_total",service="kubernetes"'
      - '-__name__="workqueue_depth",service="kubernetes"'
      - '-__name__="workqueue_queue_duration_seconds_bucket",service="kubernetes"'