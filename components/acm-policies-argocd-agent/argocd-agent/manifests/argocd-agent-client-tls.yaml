apiVersion: v1
kind: Secret
metadata:
  name: argocd-agent-client-tls
  namespace: openshift-gitops
type: kubernetes.io/tls
data:
  ca.crt: '{{hub (fromSecret "openshift-gitops" (printf "argocd-agent-%s" (index .ManagedClusterLabels "argocd-agent")) "ca.crt") hub}}'
  tls.crt: '{{hub (fromSecret "openshift-gitops" (printf "argocd-agent-%s" (index .ManagedClusterLabels "argocd-agent")) "tls.crt") hub}}'
  tls.key: '{{hub (fromSecret "openshift-gitops" (printf "argocd-agent-%s" (index .ManagedClusterLabels "argocd-agent")) "tls.key") hub}}'
