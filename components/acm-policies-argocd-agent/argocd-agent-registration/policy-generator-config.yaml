apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: argocd-agent-registration
placementBindingDefaults:
  name: argocd-agent-registration
policyDefaults:
  # musthave: avoids mustonlyhave phantom-mismatch loops on objects with
  # server-managed fields (Issuers/Certificates, ArgoCD cluster Secrets,
  # bare Namespaces). Raw object-templates set their own complianceType.
  complianceType: "musthave"
  consolidateManifests: false
  namespace: open-cluster-management-global-set
  remediationAction: enforce
policies:
  - name: argocd-agent-registration
    description: Register Argo CD Agents on Control Plane
    manifests:
      - path: manifests
    placement:
      placementName: argocd-agent-registration
