---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: argocd-agent-selfsigned
  namespace: openshift-gitops
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-agent-ca
  namespace: openshift-gitops
spec:
  isCA: true
  commonName: argocd-agent-ca
  secretName: argocd-agent-ca
  duration: 87600h
  issuerRef:
    name: argocd-agent-selfsigned
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: argocd-agent-ca
  namespace: openshift-gitops
spec:
  ca:
    secretName: argocd-agent-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-agent-resource-proxy-tls
  namespace: openshift-gitops
spec:
  secretName: argocd-agent-resource-proxy-tls
  issuerRef:
    name: argocd-agent-ca
    kind: Issuer
  commonName: openshift-gitops-agent-principal-resource-proxy
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - openshift-gitops-agent-principal-resource-proxy.openshift-gitops.svc.cluster.local
    - openshift-gitops-agent-principal-resource-proxy.openshift-gitops.svc
  usages:
    - server auth
