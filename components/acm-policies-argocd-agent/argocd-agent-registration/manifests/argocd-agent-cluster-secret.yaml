---
object-templates-raw: |
  {{- range $mc := (lookup "cluster.open-cluster-management.io/v1" "ManagedCluster" "" "" "argocd-agent").items }}
    {{- $mc_name := $mc.metadata.name }}
    {{- $agent_name := (index $mc.metadata.labels "argocd-agent")}}

  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-agent-{{ $agent_name }}-cluster
        namespace: openshift-gitops
        labels:
          argocd.argoproj.io/secret-type: cluster
          argocd-agent.argoproj-labs.io/agent-name: argocd-agent-{{ $agent_name }}
      stringData:
        name: argocd-agent-{{ $agent_name }}
        server: https://openshift-gitops-agent-principal-resource-proxy.openshift-gitops.svc.cluster.local:9090?agentName=argocd-agent-{{ $agent_name }}
        config: |
          {
            "tlsClientConfig": {
                "insecure": false,
                "certData": "{{ (fromSecret "openshift-gitops" (printf "argocd-principal-%s" $agent_name ) "tls.crt") }}",
                "keyData": "{{ (fromSecret "openshift-gitops" (printf "argocd-principal-%s" $agent_name ) "tls.key") }}",
                "caData": "{{ (fromSecret "openshift-gitops" (printf "argocd-principal-%s" $agent_name ) "ca.crt") }}"
            }
          }

  {{- end }}
