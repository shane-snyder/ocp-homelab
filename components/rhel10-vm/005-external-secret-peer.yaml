apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rhel10-peer-cloudinit
  namespace: rhel10-vm
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    name: vault-sno
    kind: ClusterSecretStore
  target:
    name: rhel10-peer-cloudinit
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Reuses the same vault creds as the first VM. cloud-init brings up the
        # vlan100 secondary NIC (eth1, persistent NM profile) and installs a
        # systemd unit serving HTTP on :8080 so the listener survives reboots
        # (the old nohup did not).
        userdata: |
          #cloud-config
          hostname: rhel10-peer
          user: cloud-user
          password: {{ .password }}
          chpasswd:
            expire: false
          rh_subscription:
            org: {{ .rh_org_id }}
            activation-key: {{ .rh_activation_key }}
          write_files:
            - path: /etc/systemd/system/httptest.service
              permissions: '0644'
              content: |
                [Unit]
                Description=test http listener on :8080
                After=network-online.target
                [Service]
                ExecStart=/usr/bin/python3 -m http.server 8080
                Restart=always
                [Install]
                WantedBy=multi-user.target
          runcmd:
            - [ sh, -c, "nmcli device set eth1 managed yes; nmcli con add type ethernet ifname eth1 con-name eth1 ipv4.method auto ipv6.method ignore || true; nmcli con up eth1 || true" ]
            - [ systemctl, daemon-reload ]
            - [ systemctl, enable, --now, httptest ]
  data:
    - secretKey: password
      remoteRef:
        key: rhel10-vm/rhel10-dnf-check-cloudinit
        property: password
    - secretKey: rh_org_id
      remoteRef:
        key: rhel10-vm/rhel10-dnf-check-cloudinit
        property: rh_org_id
    - secretKey: rh_activation_key
      remoteRef:
        key: rhel10-vm/rhel10-dnf-check-cloudinit
        property: rh_activation_key
