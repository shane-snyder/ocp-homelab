apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: rhel10-dnf-check
  namespace: rhel10-vm
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app: rhel10-dnf-check
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/domain: rhel10-dnf-check
        # role label drives MultiNetworkPolicy podSelector matching once policies
        # are authored from discovery (Phase 3).
        role: app
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          disks:
            - disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - masquerade: {}
              name: default
            # Secondary interface on the OVN-K localnet network. OVN-K assigns
            # the IP from the NAD's subnet (IPAM), so no static config needed.
            - bridge: {}
              name: vlan100
          rng: {}
        resources:
          requests:
            memory: 2Gi
      networks:
        - name: default
          pod: {}
        # Local NAD (004-network-attachment-definition.yaml). Must be in this
        # namespace due to multus namespace isolation. MultiNetworkPolicy
        # resources selecting this VM also live here (policy-for rhel10-vm/vlan100).
        - name: vlan100
          multus:
            networkName: vlan100
      volumes:
        - dataVolume:
            name: rhel10-dnf-check-rootdisk
          name: rootdisk
        - cloudInitNoCloud:
            secretRef:
              name: rhel10-dnf-check-cloudinit
          name: cloudinitdisk
  dataVolumeTemplates:
    - metadata:
        name: rhel10-dnf-check-rootdisk
      spec:
        sourceRef:
          kind: DataSource
          name: rhel10
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi
          storageClassName: lvms-dell
