apiVersion: batch/v1
kind: CronJob
metadata:
  name: idrac-start-weekday
  namespace: idrac
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  concurrencyPolicy: Allow
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - command:
            - /bin/sh
            - -c
            - |
              ipmitool -I lanplus -H "$IDRAC_HOST" -U "$IDRAC_USER" -P "$IDRAC_PASSWORD" chassis power on
            env:
            - name: IDRAC_HOST
              valueFrom:
                secretKeyRef:
                  name: idrac-secret
                  key: IDRAC_HOST
            - name: IDRAC_USER
              valueFrom:
                secretKeyRef:
                  name: idrac-secret
                  key: IDRAC_USER
            - name: IDRAC_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: IDRAC_PASSWORD
                  name: idrac-secret
            image: quay-server.apps.sno-mini.shanehomelab.com/containers/ipmitool:latest
            imagePullPolicy: IfNotPresent
            name: set-fan-speed-60
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
          dnsPolicy: ClusterFirst
          restartPolicy: OnFailure
          schedulerName: default-scheduler
          terminationGracePeriodSeconds: 30
  schedule: 00 07 * * 1-5
  successfulJobsHistoryLimit: 3
  suspend: false
  timeZone: America/New_York
