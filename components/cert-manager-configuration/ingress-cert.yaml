apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ingress-cert
  namespace: openshift-ingress
spec:
  commonName: '*.apps.replaceme.com'
  dnsNames:
  - '*.apps.replaceme.com'
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-cloudflare
  renewBefore: 168h
  secretName: replaceme
  secretTemplate:
    annotations:
      cert-utils-operator.redhat-cop.io/generate-cert-info: "true"
