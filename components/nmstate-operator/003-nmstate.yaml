# Singleton CR that tells the operator to deploy the nmstate-handler
# DaemonSet. NodeNetworkConfigurationPolicy resources are only reconciled
# once this is Running.
apiVersion: nmstate.io/v1
kind: NMState
metadata:
  name: nmstate
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    # CRD is installed by the operator (earlier wave) within this same app, so
    # skip the dry-run that would otherwise fail before the CRD exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
