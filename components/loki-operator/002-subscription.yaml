apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: loki-operator
  namespace: openshift-operators-redhat
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  # Loki operator only publishes versioned channels (no bare `stable`).
  # stable-6.5 is the default channel as of OCP 4.19. Verify/upgrade with:
  #   oc get packagemanifest loki-operator -n openshift-marketplace \
  #     -o jsonpath='{.status.defaultChannel}{"\n"}{range .status.channels[*]}{.name}{"\n"}{end}'
  channel: stable-6.5
  name: loki-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
