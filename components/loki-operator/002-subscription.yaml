apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: loki-operator
  namespace: openshift-operators-redhat
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  # NOTE: Loki operator uses versioned channels (e.g. stable-6.0, stable-6.1).
  # `stable` tracks the latest stable channel; pin to a stable-6.x if you want
  # to control upgrades. Verify with:
  #   oc get packagemanifest loki-operator -n openshift-marketplace \
  #     -o jsonpath='{.status.channels[*].name}'
  channel: stable
  name: loki-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
