apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-applications
  namespace: argocd-agent
spec:
  destination:
    namespace: argocd-agent
    server: https://kubernetes.default.svc
  project: cluster-config
  source:
    repoURL: ${INFRA_GITOPS_REPO}
    targetRevision: HEAD
    path: clusters/${CLUSTER_NAME}
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
