apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../sno
  - managed-clusters-project.yaml

helmGlobals:
  chartHome: ../../.helm-charts

helmCharts:
  # Shared apps (groups/all) deployed to sno-mini via hub
  - name: argocd-app-of-app
    releaseName: sno-mini-shared-apps
    namespace: openshift-gitops
    valuesFile: ../../groups/all/values.yaml
    valuesInline:
      disableProjects: true
      default:
        app:
          namePrefix: "sno-mini-"
          project: managed-clusters
          labels:
            cluster: sno-mini
          destination:
            server: https://api.sno-mini.shanehomelab.com:6443

  # Cluster-specific apps deployed to sno-mini via hub
  - name: argocd-app-of-app
    releaseName: sno-mini-cluster-apps
    namespace: openshift-gitops
    valuesFile: ../sno-mini/values.yaml
    valuesInline:
      disableProjects: true
      default:
        app:
          namePrefix: "sno-mini-"
          project: managed-clusters
          labels:
            cluster: sno-mini
          destination:
            server: https://api.sno-mini.shanehomelab.com:6443
      applications:
        gitops-configuration:
          enabled: false
