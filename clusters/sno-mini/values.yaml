default:
  app:
    annotations:
      argocd.argoproj.io/compare-options: IgnoreExtraneous
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    enabled: true
    enableAutoSync: false
    autoSyncPrune: false
    project: cluster-config
    labels:
      app-source: ocp-homelab
      repo: cluster-config
    destination:
      namespace: openshift-gitops
      server: https://kubernetes.default.svc
    source:
      repoURL: https://github.com/shane-snyder/ocp-homelab.git
      targetRevision: HEAD
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
      - FailOnSharedResource=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=false
    syncPolicyRetry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 10m

applications:
  # --- Shared Operators (sync-wave 5) ---
  cert-manager-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/cert-manager-operator
    destination:
      namespace: cert-manager-operator

  cert-utils-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/cert-utils-operator
    destination:
      namespace: cert-utils-operator

  acs-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/acs-operator
    destination:
      namespace: rhacs-operator

  external-secrets-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/external-secrets-operator
    destination:
      namespace: external-secrets

  redhat-opentelemetry-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/redhat-opentelemetry-operator
    destination:
      namespace: openshift-opentelemetry-operator

  # --- Gitops Configuration (sync-wave 3) ---
  gitops-configuration:
    annotations:
      argocd.argoproj.io/sync-wave: "3"
    source:
      path: clusters/sno-mini/overlays/gitops-configuration
    destination:
      namespace: openshift-gitops

  # --- Storage (sync-wave 5) ---
  lvms-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: clusters/sno-mini/overlays/lvms-operator
    destination:
      namespace: openshift-storage

  # --- Authentication (sync-wave 5) ---
  oauth:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: clusters/sno-mini/overlays/oauth
    destination:
      namespace: openshift-config

  # --- Certificate Management (sync-wave 6) ---
  cert-manager-configuration:
    annotations:
      argocd.argoproj.io/sync-wave: "6"
    source:
      path: clusters/sno-mini/overlays/cert-manager
    destination:
      namespace: cert-manager

  # --- Secrets (sync-wave 6) ---
  external-secrets-configuration:
    annotations:
      argocd.argoproj.io/sync-wave: "6"
    source:
      path: clusters/sno-mini/overlays/external-secrets
    destination:
      namespace: external-secrets

  # --- MinIO Operator (sync-wave 5) ---
  minio-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/minio/operator
      extraSourceFields: |
        helm:
          releaseName: minio-operator
          valueFiles:
            - sno-mini-values.yaml
    destination:
      namespace: minio-operator
    syncOptions:
      - CreateNamespace=true

  # --- MinIO Secrets (sync-wave 9, before tenants) ---
  minio-secrets:
    annotations:
      argocd.argoproj.io/sync-wave: "9"
    source:
      path: clusters/sno-mini/overlays/minio-secrets
    destination:
      namespace: backup
    syncOptions:
      - CreateNamespace=true

  # --- MinIO Tenant - Backup (sync-wave 10) ---
  minio-backup:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/minio/tenant-6.0.4/tenant
      extraSourceFields: |
        helm:
          releaseName: tenant-backup
          valueFiles:
            - tenants/quay/values-quay-migration.yaml
    destination:
      namespace: backup
    syncOptions:
      - CreateNamespace=true

  # --- Image Registry (sync-wave 6) ---
  image-registry:
    annotations:
      argocd.argoproj.io/sync-wave: "6"
    source:
      path: clusters/sno-mini/overlays/image-registry
    destination:
      namespace: openshift-image-registry
    syncOptions:
      - RespectIgnoreDifferences=true
    extraFields: |
      ignoreDifferences:
        - group: imageregistry.operator.openshift.io
          kind: Config
          jsonPointers:
            - /spec/httpSecret

  # --- Cost Management (sync-wave 6) ---
  cost-management:
    annotations:
      argocd.argoproj.io/sync-wave: "6"
    source:
      path: clusters/sno-mini/overlays/cost-management
    destination:
      namespace: costmanagement-metrics-operator

  # --- ACS Instance (sync-wave 10) ---
  acs-instance:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: clusters/sno-mini/overlays/acs-instance
    destination:
      namespace: stackrox

  # --- Quay (sync-wave 10) ---
  quay:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: clusters/sno-mini/overlays/quay
    destination:
      namespace: quay-enterprise

  # --- Tailscale Secrets (sync-wave 4, before operator) ---
  tailscale-operator-secrets:
    annotations:
      argocd.argoproj.io/sync-wave: "4"
    source:
      path: clusters/sno-mini/overlays/tailscale-operator
    destination:
      namespace: tailscale
    syncOptions:
      - CreateNamespace=true

  # --- Tailscale Operator (sync-wave 5) ---
  tailscale-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/tailscale-operator/1.92.5
      extraSourceFields: |
        helm:
          releaseName: tailscale-operator
          valueFiles:
            - sno-mini-values.yaml
    destination:
      namespace: tailscale
    syncOptions:
      - CreateNamespace=true

  tailscale-day2:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/tailscale-day2
    destination:
      namespace: tailscale

  # --- HashiCorp Vault (sync-wave 5) ---
  hashicorp-vault:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/hashicorp-vault
      extraSourceFields: |
        helm:
          releaseName: hashicorp-vault-operator
          valueFiles:
            - values.yaml
            - values.openshift.yaml
    destination:
      namespace: vault
    syncOptions:
      - CreateNamespace=true
    extraFields: |
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jsonPointers:
            - /webhooks/0/clientConfig/caBundle

  hashicorp-vault-addons:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/hashicorp-vault-addons
    destination:
      namespace: vault
    syncOptions:
      - CreateNamespace=true
