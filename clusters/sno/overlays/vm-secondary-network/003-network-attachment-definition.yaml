# OVN-Kubernetes localnet secondary network for CNV VMs.
#
# Why localnet + subnets:
#   - localnet bridges VMs onto the physical VLAN (via the br-ex mapping in the
#     NNCP), while OVN-K still performs IPAM because `subnets` is set.
#   - Defining `subnets` is what lets MultiNetworkPolicy use podSelector /
#     namespaceSelector peers (not just ipBlock). Don't remove it.
#
# TODO(env): set vlanID / subnets / excludeSubnets to match your fabric. Make
# sure no external DHCP server hands out addresses inside `subnets`, since
# OVN-K owns IPAM for this range.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan100
  namespace: vm-network
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "vlan100",
      "type": "ovn-k8s-cni-overlay",
      "topology": "localnet",
      "netAttachDefName": "vm-network/vlan100",
      "physicalNetworkName": "vlan100",
      "vlanID": 100,
      "subnets": "192.168.100.0/24",
      "excludeSubnets": "192.168.100.1/32"
    }
