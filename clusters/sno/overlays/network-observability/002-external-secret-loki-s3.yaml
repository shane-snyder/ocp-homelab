# S3 credentials/config consumed by the LokiStack (spec.storage.secret).
# Pulls from Vault via the same ClusterSecretStore used by minio-secrets.
#
# TODO(env): create a "netobserv-loki" bucket on your MinIO/Garage tenant and
# store its access key/secret in Vault at the path below. Set the endpoint to
# your in-cluster S3 service. On sno the options are:
#   - Garage:  http://garage.garage.svc:3900
#   - MinIO:   https://minio.<tenant-namespace>.svc:443  (e.g. opentelemetry)
# Use a dedicated bucket (not the tempo-ossm3 one).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: netobserv-loki-s3
  namespace: netobserv
  annotations:
    argocd.argoproj.io/sync-wave: "9"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    name: vault-sno
    kind: ClusterSecretStore
  target:
    name: netobserv-loki-s3
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Keys are the exact field names LokiStack's s3 secret expects.
        access_key_id: "{{ .accessKey }}"
        access_key_secret: "{{ .secretKey }}"
        bucketnames: "netobserv-loki"
        endpoint: "http://garage.garage.svc:3900"  # TODO(env): confirm S3 endpoint
        region: "us-east-1"
  data:
    - secretKey: accessKey
      remoteRef:
        key: minio/netobserv-loki
        property: accessKey
    - secretKey: secretKey
      remoteRef:
        key: minio/netobserv-loki
        property: secretKey
