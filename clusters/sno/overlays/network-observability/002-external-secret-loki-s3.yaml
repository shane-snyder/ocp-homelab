# S3 credentials/config consumed by the LokiStack (spec.storage.secret).
# Pulls from Vault via the same ClusterSecretStore used by minio-secrets.
#
# Backed by Garage: dedicated bucket "netobserv-loki" + RWO key, creds stored in
# Vault at sno/netobserv/netobserv-loki-s3 (accessKey/secretKey). Region "garage"
# must match the garage s3.api.region setting.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: netobserv-loki-s3
  namespace: netobserv
  annotations:
    argocd.argoproj.io/sync-wave: "9"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    name: vault-sno
    kind: ClusterSecretStore
  target:
    name: netobserv-loki-s3
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Keys are the exact field names LokiStack's s3 secret expects.
        access_key_id: "{{ .accessKey }}"
        access_key_secret: "{{ .secretKey }}"
        bucketnames: "netobserv-loki"
        endpoint: "http://garage.garage.svc:3900"
        region: "garage"  # must match garage s3.api.region (components/garage/sno-values.yaml)
  data:
    - secretKey: accessKey
      remoteRef:
        key: netobserv/netobserv-loki-s3
        property: accessKey
    - secretKey: secretKey
      remoteRef:
        key: netobserv/netobserv-loki-s3
        property: secretKey
