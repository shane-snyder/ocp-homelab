default:
  app:
    annotations:
      argocd.argoproj.io/compare-options: IgnoreExtraneous
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    enabled: true
    enableAutoSync: false
    autoSyncPrune: false
    project: cluster-config
    labels:
      app-source: ocp-homelab
      repo: cluster-config
    destination:
      namespace: openshift-gitops
      server: https://kubernetes.default.svc
    source:
      repoURL: https://github.com/shane-snyder/ocp-homelab.git
      targetRevision: HEAD
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
      - FailOnSharedResource=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=false
    syncPolicyRetry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 10m

applications:
  # --- Root Application (sync-wave 1, self-managing) ---
  root-applications:
    annotations:
      argocd.argoproj.io/sync-wave: "1"
    enableAutoSync: true
    autoSyncPrune: false
    source:
      path: clusters/sno
    destination:
      namespace: argocd-agent

  # --- Gitops Configuration (sync-wave 3) ---
  gitops-configuration:
    annotations:
      argocd.argoproj.io/sync-wave: "3"
    source:
      path: clusters/sno/overlays/gitops-configuration
    destination:
      namespace: argocd

  # --- Storage (sync-wave 5) ---
  lvms-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: clusters/sno/overlays/lvms-operator
    destination:
      namespace: openshift-storage

  # --- Authentication (sync-wave 5) ---
  oauth:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: clusters/sno/overlays/oauth
    destination:
      namespace: openshift-config

  # --- Shared Operators (sync-wave 5) ---
  cert-manager-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/cert-manager-operator
    destination:
      namespace: cert-manager-operator

  acs-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/acs-operator
    destination:
      namespace: rhacs-operator

  external-secrets-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/external-secrets-operator
    destination:
      namespace: external-secrets

#  redhat-opentelemetry-operator:
#    annotations:
#      argocd.argoproj.io/sync-wave: "5"
#    source:
#      path: components/redhat-opentelemetry-operator
#    destination:
#      namespace: openshift-opentelemetry-operator

  openshift-pipelines-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/openshift-pipelines-operator
    destination:
      namespace: openshift-pipelines

  # --- Certificate Management (sync-wave 6) ---
  cert-manager-configuration:
    annotations:
      argocd.argoproj.io/sync-wave: "6"
    source:
      path: clusters/sno/overlays/cert-manager
    destination:
      namespace: cert-manager

  # --- Secrets (sync-wave 6) ---
  external-secrets-configuration:
    annotations:
      argocd.argoproj.io/sync-wave: "6"
    source:
      path: clusters/sno/overlays/external-secrets
    destination:
      namespace: external-secrets

  # --- Garage Object Storage (sync-wave 5) ---
  garage:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/garage
      extraSourceFields: |
        helm:
          releaseName: garage
          valueFiles:
            - sno-values.yaml
    destination:
      namespace: garage
    syncOptions:
      - RespectIgnoreDifferences=true
    extraFields: |
      ignoreDifferences:
        - group: ""
          kind: Secret
          name: garage-rpc-secret
          jsonPointers:
            - /data

  # --- Garage Secrets (sync-wave 9, before workload updates) ---
  garage-secrets:
    annotations:
      argocd.argoproj.io/sync-wave: "9"
    source:
      path: clusters/sno/overlays/garage-secrets
    destination:
      namespace: garage

  # --- MinIO Operator (sync-wave 5) ---
  minio-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/minio/operator
      extraSourceFields: |
        helm:
          releaseName: minio-operator
          valueFiles:
            - sno-values.yaml
    destination:
      namespace: minio-operator
    syncOptions:
      - CreateNamespace=true

  # --- MinIO Secrets (sync-wave 9, before tenants) ---
  minio-secrets:
    annotations:
      argocd.argoproj.io/sync-wave: "9"
    source:
      path: clusters/sno/overlays/minio-secrets
    destination:
      namespace: opentelemetry
    syncOptions:
      - CreateNamespace=true

  # --- MinIO Tenant - Tempo/OSSM3 (sync-wave 10) ---
  minio-tempo-ossm3:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/minio/tenant-6.0.4/tenant
      extraSourceFields: |
        helm:
          releaseName: tenant-tempo-ossm3
          valueFiles:
            - tenants/tempo-ossm3/values-tempo-ossm3.yaml
    destination:
      namespace: opentelemetry

  # --- Image Registry (sync-wave 6) ---
  image-registry:
    annotations:
      argocd.argoproj.io/sync-wave: "6"
    source:
      path: clusters/sno/overlays/image-registry
    destination:
      namespace: openshift-image-registry
    syncOptions:
      - RespectIgnoreDifferences=true
    extraFields: |
      ignoreDifferences:
        - group: imageregistry.operator.openshift.io
          kind: Config
          jsonPointers:
            - /spec/httpSecret

  # --- Cost Management (sync-wave 6) ---
  cost-management:
    annotations:
      argocd.argoproj.io/sync-wave: "6"
    source:
      path: clusters/sno/overlays/cost-management
    destination:
      namespace: costmanagement-metrics-operator

  # --- ACS Instance (sync-wave 10) ---
  acs-instance:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: clusters/sno/overlays/acs-instance
    destination:
      namespace: stackrox

  # --- Quay (sync-wave 10) ---
  quay:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: clusters/sno/overlays/quay
    destination:
      namespace: quay-enterprise

  # --- ACM Policies - Project Quotas (sync-wave 8) ---
  acm-policies-project-quotas:
    annotations:
      argocd.argoproj.io/sync-wave: "8"
    source:
      path: components/acm-policies-project-quotas
    destination:
      namespace: open-cluster-management-global-set

  # --- ACM Policies - ArgoCD Agent (sync-wave 8) ---
  acm-policies-argocd-agent:
    annotations:
      argocd.argoproj.io/sync-wave: "8"
    source:
      path: components/acm-policies-argocd-agent
    destination:
      namespace: open-cluster-management-global-set

  # --- ACM (sync-wave 5) ---
  acm-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: clusters/sno/overlays/acm-operator
    destination:
      namespace: open-cluster-management

  acm-instance:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/acm-instance
    destination:
      namespace: open-cluster-management

  acm-observability:
    annotations:
      argocd.argoproj.io/sync-wave: "15"
    source:
      path: components/acm-observability
    destination:
      namespace: open-cluster-management

  # --- Ansible Automation Platform Operator (sync-wave 5) ---
  aap-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/aap-operator
    destination:
      namespace: ansible-automation-platform

  # --- Ansible Automation Platform Instance (sync-wave 10) ---
  ansible-automation-platform:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/aap-instance
    destination:
      namespace: ansible-automation-platform
    syncOptions:
      - RespectIgnoreDifferences=true
    extraFields: |
      ignoreDifferences:
        - group: automationcontroller.ansible.com
          kind: AutomationController
          jsonPointers:
            - /spec/admin_password_secret

  # --- Custom Metrics Autoscaler (sync-wave 5) ---
  custom-metrics-autoscaler:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/custom-metrics-autoscaler-operator
    destination:
      namespace: openshift-keda

  # --- Cluster Observability (sync-wave 5) ---
  cluster-observability-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/cluster-observability-operator
    destination:
      namespace: openshift-cluster-observability-operator
    syncOptions:
      - RespectIgnoreDifferences=true
    extraFields: |
      ignoreDifferences:
        - group: operators.coreos.com
          kind: OperatorGroup
          jsonPointers:
            - /metadata/annotations/olm.providedAPIs

  # --- OpenShift Virtualization (sync-wave 5) ---
  openshift-virtualization-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/openshift-virtualization-operator
    destination:
      namespace: openshift-cnv

  # --- NMState Operator (sync-wave 5) ---
  # Drives the OVS bridge mapping (NodeNetworkConfigurationPolicy) for the
  # VM secondary network.
  nmstate-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/nmstate-operator
    destination:
      namespace: openshift-nmstate

  # --- Loki Operator (sync-wave 5) ---
  # Backing store for NetObserv flows.
  loki-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/loki-operator
    destination:
      namespace: openshift-operators-redhat

  # --- Network Observability Operator (sync-wave 5) ---
  network-observability-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/network-observability-operator
    destination:
      namespace: openshift-netobserv-operator

  # --- VM Secondary Network: NAD + OVS bridge mapping (sync-wave 7) ---
  vm-secondary-network:
    annotations:
      argocd.argoproj.io/sync-wave: "7"
    source:
      path: clusters/sno/overlays/vm-secondary-network
    destination:
      namespace: vm-network
    syncOptions:
      - CreateNamespace=true

  # --- Network Observability: LokiStack + FlowCollector (sync-wave 10) ---
  network-observability:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: clusters/sno/overlays/network-observability
    destination:
      namespace: netobserv
    syncOptions:
      - CreateNamespace=true

  # --- VM MultiNetworkPolicies (Phase 3 — intentionally NOT enabled) ---
  # Uncomment ONLY after discovery is complete and allow-* rules are authored.
  # Applying default-deny without allows will blackhole VM secondary traffic.
  # Also requires `useMultiNetworkPolicy: true` on the cluster Network CR.
  # vm-multinetworkpolicies:
  #   annotations:
  #     argocd.argoproj.io/sync-wave: "20"
  #   source:
  #     path: components/vm-multinetworkpolicies
  #   destination:
  #     namespace: rhel10-vm

  # --- Power Monitoring (sync-wave 10) ---
  power-monitoring:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/power-monitoring
    destination:
      namespace: openshift-power-monitoring

  # --- Splunk (sync-wave 10) ---
  splunk:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/splunk
    destination:
      namespace: splunk

  # --- Tailscale Secrets (sync-wave 4, before operator) ---
  tailscale-operator-secrets:
    annotations:
      argocd.argoproj.io/sync-wave: "4"
    source:
      path: clusters/sno/overlays/tailscale-operator
    destination:
      namespace: tailscale
    syncOptions:
      - CreateNamespace=true

  # --- Tailscale Operator (sync-wave 5) ---
  tailscale-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/tailscale-operator
      extraSourceFields: |
        helm:
          releaseName: tailscale-operator
          valueFiles:
            - sno-values.yaml
    destination:
      namespace: tailscale
    syncOptions:
      - CreateNamespace=true

  tailscale-day2:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/tailscale-day2
    destination:
      namespace: tailscale

  # --- HashiCorp Vault Addons (sync-wave 10) ---
  hashicorp-vault-addons:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/hashicorp-vault-addons
    destination:
      namespace: vault
    syncOptions:
      - CreateNamespace=true

  # --- OADP Operator (sync-wave 5) ---
  oadp-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/oadp-operator
    destination:
      namespace: openshift-adp

  # --- Compliance Operator (sync-wave 5) ---
  compliance-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/compliance-operator
    destination:
      namespace: openshift-compliance

  compliance-configuration:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/compliance-configuration
    destination:
      namespace: openshift-compliance

  # --- Tempo (sync-wave 5) ---
  tempo-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    source:
      path: components/tempo-operator
    destination:
      namespace: openshift-tempo-operator

  tempo-configuration:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/tempo-configuration
    destination:
      namespace: openshift-tempo-operator

  # --- Ollama + Open WebUI (sync-wave 10) ---
  ollama:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/ollama
    destination:
      namespace: ollama

  # --- RHEL 10 VM (sync-wave 10) ---
  rhel10-vm:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/rhel10-vm
    destination:
      namespace: rhel10-vm
    syncOptions:
      - CreateNamespace=true
    # kubemacpool re-stamps this annotation on every apply on any VM with a
    # secondary (bridge) interface, which otherwise keeps the app OutOfSync.
    # No name => applies to all VirtualMachines in this app.
    extraFields: |
      ignoreDifferences:
        - group: kubevirt.io
          kind: VirtualMachine
          jsonPointers:
            - /metadata/annotations/kubemacpool.io~1transaction-timestamp

  # --- OpenShift MCP Server (sync-wave 10) ---
  openshift-mcp-server:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      path: components/openshift-mcp-server
      extraSourceFields: |
        helm:
          releaseName: openshift-mcp-server
          valueFiles:
            - values-openshift.yaml
            - sno-values.yaml
    destination:
      namespace: openshift-mcp-server
    syncOptions:
      - CreateNamespace=true

  # --- OCP Apps (sync-wave 10, app-of-apps for health-monitoring) ---
  ocp-apps:
    annotations:
      argocd.argoproj.io/sync-wave: "10"
    source:
      repoURL: https://github.com/shane-snyder/ocp-apps.git
      path: clusters/sno
    destination:
      namespace: argocd-agent
